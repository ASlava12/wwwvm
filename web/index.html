<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>wwwvm — Rust VM in the browser</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>wwwvm</h1>
      <span id="status" class="status">idle</span>
    </header>

    <main>
      <section id="terminal-pane">
        <div id="terminal"></div>
      </section>

      <aside id="controls">
        <fieldset>
          <legend>Guest</legend>
          <label>
            <input type="radio" name="guest" value="default" checked />
            Default (poll LSR + echo)
          </label>
          <br />
          <label>
            <input type="radio" name="guest" value="interactive" />
            Interactive (IRQ-driven echo + banner)
          </label>
          <br />
          <label>
            <input type="radio" name="guest" value="calculator" />
            Calculator (squares each input byte)
          </label>
          <br />
          <label>
            <input type="radio" name="guest" value="pm" />
            PM kernel (bzImage handoff → UART → HLT)
          </label>
        </fieldset>
        <fieldset>
          <legend>Autorun (one command per line)</legend>
          <textarea id="autorun" rows="4" placeholder="echo hello&#10;uname -a"></textarea>
        </fieldset>
        <button id="boot">Boot VM</button>

        <fieldset>
          <legend>Boot Linux / Alpine (real kernel)</legend>
          <label>kernel (vmlinuz bzImage):
            <input type="file" id="kernel-file" />
          </label>
          <br />
          <label>initramfs (cpio, optional):
            <input type="file" id="initrd-file" />
          </label>
          <br />
          <label>cmdline:
            <input id="cmdline" type="text"
              value="earlyprintk=ttyS0,115200 console=ttyS0 panic=10 lpj=1000000 loglevel=4" />
          </label>
          <br />
          <button id="boot-linux">Boot Linux</button>
          <small id="linux-status" class="status">pick a kernel (+ initramfs) to boot</small>
        </fieldset>

        <fieldset>
          <legend>Send command</legend>
          <input id="cmd" type="text" placeholder="type and press Enter" />
          <button id="send">runCommand()</button>
        </fieldset>

        <fieldset>
          <legend>Last result</legend>
          <pre id="last-result">(none yet)</pre>
        </fieldset>

        <fieldset>
          <legend>Snapshot / restore</legend>
          <div class="snapshot-row">
            <button id="save">Save</button>
            <button id="load">Load</button>
          </div>
          <div class="snapshot-row">
            <button id="download">Download .bin</button>
            <button id="upload-trigger">Upload .bin</button>
            <input type="file" id="upload" hidden accept=".bin" />
          </div>
          <small id="snapshot-status" class="status">no snapshot saved yet</small>
        </fieldset>

        <fieldset>
          <legend>VGA snapshot (0xB8000)</legend>
          <pre id="vga">(empty)</pre>
        </fieldset>

        <fieldset>
          <legend>Diagnostics</legend>
          <pre id="diag">CPU not booted</pre>
        </fieldset>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
