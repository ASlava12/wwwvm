# One-command public deploy of wwwvm (static site + WebSocket↔TCP relay behind
# single-origin TLS). See docs/DEPLOY.md.
#
#   # build web/pkg (wasm) and web/images (guest cpios) on the host FIRST, then:
#   WWWVM_DOMAIN=example.com docker compose up -d --build
#
# Local test (Caddy serves an internal self-signed cert for localhost):
#   docker compose up --build      # then open https://localhost
services:
  relay:
    build: .
    image: wwwvm-servers:latest # shared by the snapstore service (built once)
    command: ["wwwvm-proxy", "0.0.0.0:8080"]
    expose: ["8080"] # internal only; reached via Caddy /ws
    environment:
      # SCOPE THIS to only the hosts your demo needs (apk mirrors here). Never
      # `*` on a public deploy — that's an open relay. comma/newline separated.
      WWWVM_PROXY_ALLOWLIST: "${WWWVM_PROXY_ALLOWLIST:-dl-cdn.alpinelinux.org:80,dl-cdn.alpinelinux.org:443}"
      # Lock WebSocket Origin to the page (Caddy forwards the browser's Origin).
      WWWVM_PROXY_ORIGINS: "https://${WWWVM_DOMAIN:-localhost}"
      # Abuse limits (0 = off). Conn caps are on; tune for your traffic.
      WWWVM_PROXY_MAX_CONNS: "${WWWVM_PROXY_MAX_CONNS:-512}"
      WWWVM_PROXY_MAX_CONNS_PER_IP: "${WWWVM_PROXY_MAX_CONNS_PER_IP:-16}"
      WWWVM_PROXY_IDLE_TIMEOUT_SECS: "${WWWVM_PROXY_IDLE_TIMEOUT_SECS:-120}"
      # Optional: rotate guest egress through public proxies (hides your IP).
      # Point at a file you keep refreshed with scripts/fetch-proxies.py.
      # WWWVM_PROXY_UPSTREAMS_FILE: "/data/proxies.json"
    restart: unless-stopped

  # Content-addressed snapshot store (custom-snapshot platform). Reached via
  # Caddy at /snap/* (same origin as the page). Uploads need the admin token;
  # reads are open. Without WWWVM_SNAPSTORE_TOKEN it's read-only.
  snapstore:
    image: wwwvm-servers:latest # same image relay builds (run after relay)
    command: ["snapstore-server", "0.0.0.0:8090"]
    expose: ["8090"]
    environment:
      WWWVM_SNAPSTORE_TOKEN: "${WWWVM_SNAPSTORE_TOKEN:-}"
      WWWVM_SNAPSTORE_ROOT: "/data"
    volumes:
      - snapstore_data:/data
    depends_on:
      - relay
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      WWWVM_DOMAIN: "${WWWVM_DOMAIN:-localhost}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/web:ro # the static site (build web/pkg + web/images first!)
      - caddy_data:/data # persists the issued TLS certs
      - caddy_config:/config
    depends_on:
      - relay
      - snapstore
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  snapstore_data:
