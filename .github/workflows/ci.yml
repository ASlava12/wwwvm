name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install stable --profile minimal --component rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install stable --profile minimal --component clippy
      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install stable --profile minimal
      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: cargo test --workspace
        run: cargo test --workspace --locked

  web-js:
    name: web-js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: pure-logic JS tests (net-route, l2-switch, snapshot-store, ps2-keymap)
        run: ./scripts/test-web-js.sh

  wasm-build:
    name: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + wasm32 target
        run: |
          rustup show active-toolchain || rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-
      # The shipped artifact: ensure it compiles for its real target (catches a
      # non-wasm-compatible dep or a usize-32 regression that the host build misses).
      - name: cargo build -p wwwvm-wasm --target wasm32-unknown-unknown
        run: cargo build -p wwwvm-wasm --target wasm32-unknown-unknown --release

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Fails CI on a known vulnerability (RUSTSEC) in any dependency. Plain
      # `cargo audit` exits 0 on informational "unmaintained" warnings, so the
      # tree stays green until an actual advisory lands.
      - name: cargo audit
        run: cargo audit
